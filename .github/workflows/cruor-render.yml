name: ANGRON - F03_CRUOR Render

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "ID du projet (ex: 001, 002)"
        required: true
        default: "001"
      format:
        description: "Format : short ou longform"
        required: false
        default: "short"

jobs:
  render:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR (pull image manimgl)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Render toutes les scenes (manimgl via Docker)
        run: |
          SCENES="F03_CRUOR/CODEBASE/scenes_${{ inputs.project_id }}.py"
          OUT_DIR="F03_CRUOR/OUT"
          STAGED="F03_CRUOR/OUT/staged_${{ inputs.project_id }}.mp4"
          mkdir -p "$OUT_DIR"
          bash F03_CRUOR/CODEBASE/render.sh \
            --scenes  "$SCENES" \
            --all \
            --out-dir "$OUT_DIR" \
            --staged  "$STAGED" \
            --format  "${{ inputs.format }}"

      - name: Mettre a jour ledger STATE_6_GATE
        run: |
          python3 - <<'PYEOF'
          import json, datetime
          with open('.angron/ledger.json') as f:
              l = json.load(f)
          pid = "${{ inputs.project_id }}"
          staged = f"F03_CRUOR/OUT/staged_{pid}.mp4"
          l['projet_actif']['etape'] = 'STATE_6_GATE'
          l['projet_actif']['fichiers']['staged'] = staged
          l['projet_actif']['derniere_mise_a_jour'] = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          with open('.angron/ledger.json', 'w') as f:
              json.dump(l, f, indent=2, ensure_ascii=False)
          print('Ledger STATE_6_GATE OK')
          PYEOF

      - name: Commit render et ledger
        run: |
          git config user.name "ANGRON-CRUOR"
          git config user.email "cruor@angron.bot"
          git add F03_CRUOR/OUT/staged_${{ inputs.project_id }}.mp4 .angron/ledger.json
          git diff --cached --quiet || git commit -m "ANGRON ${{ inputs.project_id }} - STATE_6_GATE : render brut CRUOR produit"
          git push
