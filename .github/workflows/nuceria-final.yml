name: ANGRON - F05_NUCERIA Final

on:
  workflow_dispatch:

jobs:
  nuceria:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FFmpeg et ffprobe
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Run nuceria.py
        run: |
          mkdir -p F05_NUCERIA/OUT
          python3 F05_NUCERIA/CODEBASE/nuceria.py \
            --input   F04_NAILS/OUT/nails_out_001.mp4 \
            --concept "Boxe le mythe des geants" \
            --format  short \
            --output  F05_NUCERIA/OUT/youtube_short_001.mp4
          ls -lh F05_NUCERIA/OUT/

      - name: Mettre a jour ledger STATE_9
        run: |
          python3 angron.py update \
            --state STATE_9 \
            --final F05_NUCERIA/OUT/youtube_short_001.mp4

      - name: Archiver le cycle dans le ledger
        run: |
          python3 angron.py archive

      - name: Commit final
        run: |
          git config user.name "ANGRON-NUCERIA"
          git config user.email "nuceria@angron.bot"
          git add F05_NUCERIA/OUT/youtube_short_001.mp4 \
                  F05_NUCERIA/OUT/rapport_f05.html \
                  F05_NUCERIA/OUT/NUCERIA_DONE.txt \
                  .angron/ledger.json
          git diff --cached --quiet || git commit -m "ANGRON 001 - cycle complet archivé : youtube_short_001.mp4"
          git push
