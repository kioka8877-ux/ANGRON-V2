name: ANGRON - F02_LACERAT Whisper Sync

on:
  workflow_dispatch:
    inputs:
      audio:
        description: "Audio (ex: F02_LACERAT/IN/voice_001.mp3)"
        required: true
        default: "F02_LACERAT/IN/Generated-Audio-June-14_-2026-8_19AM.mp3"
      script:
        description: "Script (ex: F01_SANGUIS/OUT/script_001.md)"
        required: true
        default: "F01_SANGUIS/OUT/script_001.md"
      output:
        description: "Sortie JSON timestamps"
        required: true
        default: "F02_LACERAT/OUT/whisper_timestamps_001.json"
      language:
        description: "Langue : auto, en, fr"
        required: false
        default: "auto"
      model:
        description: "Modele Whisper : tiny, base, small, medium, large-v3"
        required: false
        default: "small"
      debug:
        description: "Debug verbose : true ou false"
        required: false
        default: "false"

jobs:
  whisper:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-faster-whisper-${{ runner.os }}-v1

      - name: Cache modele Whisper
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: whisper-model-${{ inputs.model }}-v1

      - name: Install faster-whisper et ffmpeg
        run: |
          sudo apt-get install -y --no-install-recommends ffmpeg
          pip install "faster-whisper>=1.0.0"

      - name: Transcription Whisper
        run: |
          mkdir -p F02_LACERAT/OUT
          DEBUG_FLAG=""
          if [ "${{ inputs.debug }}" = "true" ]; then
            DEBUG_FLAG="--debug"
          fi
          python3 F02_LACERAT/CODEBASE/whisper_sync.py \
            --audio    "${{ inputs.audio }}" \
            --script   "${{ inputs.script }}" \
            --output   "${{ inputs.output }}" \
            --model    "${{ inputs.model }}" \
            --language "${{ inputs.language }}" \
            $DEBUG_FLAG

      - name: Mettre a jour ledger timestamps
        run: |
          python3 -c "import json,datetime; f=open('.angron/ledger.json'); l=json.load(f); f.close(); fichiers=l.get('projet_actif',{}).get('fichiers'); fichiers and fichiers.update({'timestamps':'${{ inputs.output }}'}); l['projet_actif']['derniere_mise_a_jour']=datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'); f=open('.angron/ledger.json','w'); json.dump(l,f,indent=2,ensure_ascii=False); f.close(); print('Ledger timestamps OK')"

      - name: Commit timestamps et ledger
        run: |
          git config user.name "ANGRON-LACERAT"
          git config user.email "lacerat@angron.bot"
          git add F02_LACERAT/OUT/ .angron/ledger.json
          git diff --cached --quiet || git commit -m "ANGRON - F02_LACERAT : whisper timestamps (${{ inputs.language }} / ${{ inputs.model }})"
          git push
