name: ANGRON - F04_NAILS Finish

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "ID du projet (ex: 001, 002)"
        required: true
        default: "001"
      audio:
        description: "Chemin audio voix (ex: F02_LACERAT/IN/voice_002.mp3)"
        required: true
        default: "F02_LACERAT/IN/Generated-Audio-June-14_-2026-8_19AM.mp3"
      mode:
        description: "Mode : math_script, math_no_script, hook"
        required: true
        default: "math_script"
      format:
        description: "Format : short ou longform"
        required: false
        default: "short"

jobs:
  nails:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Run finish.sh F04_NAILS
        run: |
          mkdir -p F04_NAILS/OUT
          chmod +x F04_NAILS/CODEBASE/finish.sh
          VIDEO="F03_CRUOR/OUT/cruor_render_${{ inputs.project_id }}.mp4"
          OUTPUT="F04_NAILS/OUT/nails_out_${{ inputs.project_id }}.mp4"
          bash F04_NAILS/CODEBASE/finish.sh \
            --video "$VIDEO" \
            --audio "${{ inputs.audio }}" \
            --mode  "${{ inputs.mode }}" \
            --format "${{ inputs.format }}" \
            --output "$OUTPUT"
          ls -lh F04_NAILS/OUT/

      - name: Mettre a jour ledger STATE_8
        run: |
          python3 -c "
          import json, datetime
          with open('.angron/ledger.json') as f:
              l = json.load(f)
          pid = '${{ inputs.project_id }}'
          output = f'F04_NAILS/OUT/nails_out_{pid}.mp4'
          l['projet_actif']['etape'] = 'STATE_8'
          l['projet_actif']['fichiers']['nails_out'] = output
          l['projet_actif']['derniere_mise_a_jour'] = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          with open('.angron/ledger.json', 'w') as f:
              json.dump(l, f, indent=2, ensure_ascii=False)
          print('Ledger STATE_8 OK')
          "

      - name: Commit nails_out et ledger
        run: |
          git config user.name "ANGRON-NAILS"
          git config user.email "nails@angron.bot"
          git add F04_NAILS/OUT/nails_out_${{ inputs.project_id }}.mp4 .angron/ledger.json
          git diff --cached --quiet || git commit -m "ANGRON ${{ inputs.project_id }} - STATE_8 : fusion audio+video NAILS OK"
          git push
