name: ANGRON - F04_NAILS Finish

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "ID du projet (ex: 003, 004)"
        required: true
        default: "003"
      audio:
        description: "Chemin audio voix (ex: F02_LACERAT/IN/voice_002.mp3)"
        required: true
        default: "F02_LACERAT/IN/voice_002.mp3"
      hook:
        description: "Chemin hook clip (ex: F02_LACERAT/IN/HOOK/hook_ready.mp4) — requis si mode=hook ou image_bg"
        required: false
        default: ""
      bg_image:
        description: "Chemin image fond (ex: F02_LACERAT/IN/bg_lamine.jpg) — requis si mode=image_bg"
        required: false
        default: ""
      mode:
        description: "Mode : math_script, math_no_script, hook, image_bg"
        required: true
        default: "hook"
      format:
        description: "Format : short ou longform"
        required: false
        default: "short"

jobs:
  nails:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg bc

      - name: Run finish.sh F04_NAILS
        run: |
          mkdir -p F04_NAILS/OUT
          chmod +x F04_NAILS/CODEBASE/finish.sh
          VIDEO="F03_CRUOR/OUT/cruor_render_${{ inputs.project_id }}.mp4"
          OUTPUT="F04_NAILS/OUT/nails_out_${{ inputs.project_id }}.mp4"

          HOOK_ARG=""
          if [[ -n "${{ inputs.hook }}" ]]; then
            HOOK_ARG="--hook ${{ inputs.hook }}"
          fi

          BG_ARG=""
          if [[ -n "${{ inputs.bg_image }}" ]]; then
            BG_ARG="--bg-image ${{ inputs.bg_image }}"
          fi

          bash F04_NAILS/CODEBASE/finish.sh \
            --staged "$VIDEO" \
            --audio  "${{ inputs.audio }}" \
            $HOOK_ARG \
            $BG_ARG \
            --mode   "${{ inputs.mode }}" \
            --format "${{ inputs.format }}" \
            --output "$OUTPUT"

          ls -lh F04_NAILS/OUT/

      - name: Mettre a jour ledger STATE_8
        run: |
          python3 - <<'PYEOF'
          import json, datetime
          ledger_path = ".angron/ledger.json"
          with open(ledger_path) as f:
              l = json.load(f)
          pid = "${{ inputs.project_id }}"
          output = f"F04_NAILS/OUT/nails_out_{pid}.mp4"
          l["projet_actif"]["etape"] = "STATE_8"
          l["projet_actif"]["fichiers"]["nails_out"] = output
          l["projet_actif"]["derniere_mise_a_jour"] = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          with open(ledger_path, "w") as f:
              json.dump(l, f, indent=2, ensure_ascii=False)
          print("Ledger STATE_8 OK")
          PYEOF

      - name: Commit nails_out et ledger
        run: |
          git config user.name "ANGRON-NAILS"
          git config user.email "nails@angron.bot"
          git add F04_NAILS/OUT/nails_out_${{ inputs.project_id }}.mp4 .angron/ledger.json
          git diff --cached --quiet || git commit -m "ANGRON ${{ inputs.project_id }} - STATE_8 : fusion NAILS OK (mode ${{ inputs.mode }})"
          git push
